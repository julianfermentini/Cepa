services:
  postgres:
    image: postgres:16-alpine
    container_name: cepa_postgres
    environment:
      POSTGRES_USER: cepa
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cepa_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cepa -d cepa_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cepa_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cepa_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: cepa_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go_cache:/root/go/pkg/mod
    working_dir: /app

  ai-sidecar:
    build:
      context: ./ai-sidecar
      dockerfile: Dockerfile
    container_name: cepa_ai_sidecar
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

  dashboard:
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile.dev
    container_name: cepa_dashboard
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      - API_PROXY_TARGET=http://api:8080

volumes:
  postgres_data:
  redis_data:
  minio_data:
  go_cache:
  dashboard_node_modules:
